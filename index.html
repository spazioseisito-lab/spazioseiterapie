<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spazio Séi — In arrivo</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="layout">

        <!-- Colonna sinistra — identità visiva -->
        <div class="col-left">
            <img src="logo.webp" alt="Spazio Séi" class="wip-logo" loading="eager" />
            <p class="wip-tagline">Terapie espressive e psicocorporee</p>
        </div>

        <!-- Separatore verticale -->
        <div class="col-divider" aria-hidden="true"></div>

        <!-- Colonna destra — messaggio + info -->
        <div class="col-right">
            <p class="wip-claim">
                Lo <em class="em-spazio">spazio</em> c'è già.<br>
                Le <em class="em-sei">séi</em> professioniste anche.<br>
                <span class="claim-last">A breve, anche qui.</span>
            </p>
            <p class="wip-address">Viale Risorgimento, 19 &middot; Forlì</p>
        </div>

    </div>

</body>
</html>
